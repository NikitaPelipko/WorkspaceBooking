<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Этаж — WorkSpace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .workplaces-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 12px; }
    .room-card { margin-bottom: 14px; }
    .filter-bar-inline {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      align-items: flex-end;
    }
    .filter-bar-inline .form-group { margin: 0; flex: 1; min-width: 150px; }
    .search-input-inline {
      width: 100%;
      padding: 10px 14px 10px 38px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: var(--font-sans);
      color: var(--text-main);
      background: var(--surface);
      transition: border-color .15s;
      outline: none;
    }
    .search-input-inline:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .search-wrapper-inline { position: relative; flex: 2; min-width: 200px; }
    .search-wrapper-inline svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  </style>
</head>
<body>

<nav class="app-nav" id="app-nav"></nav>
<div id="toast-container"></div>

<div class="page-container">
  <div class="breadcrumb-bar">
    <a href="home.html">Главная</a>
    <span class="sep">›</span>
    <a href="buildings.html">Корпуса</a>
    <span class="sep">›</span>
    <a href="#" id="bc-building">Корпус</a>
    <span class="sep">›</span>
    <span class="current" id="bc-floor">Этаж</span>
  </div>

  <div class="page-header">
    <h1 id="page-title">Этаж</h1>
    <p id="page-sub">Выберите помещение или рабочее место</p>
  </div>

  <!-- TIME RANGE -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-body">
      <div class="section-title" style="margin-bottom:12px">Интервал бронирования</div>
      <div class="form-row" style="align-items:flex-end">
        <div class="form-group" style="margin:0">
          <label class="form-label">С</label>
          <input type="datetime-local" id="time-from" class="form-control"/>
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">По</label>
          <input type="datetime-local" id="time-to" class="form-control"/>
        </div>
      </div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filter-bar-inline">
    <div class="search-wrapper-inline">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
      <input type="text" id="search-filter" class="search-input-inline" placeholder="Поиск по названию или коду..." oninput="applyFilters()"/>
    </div>
    <div class="form-group" style="flex:1">
      <select id="type-filter" class="form-control" onchange="applyFilters()">
        <option value="">Все типы</option>
        <option value="OPEN_SPACE">Опенспейс</option>
        <option value="MEETING_ROOM">Переговорная</option>
        <option value="COWORKING">Коворкинг</option>
        <option value="LECTURE_ROOM">Лекционный зал</option>
      </select>
    </div>
    <button class="btn-secondary" onclick="loadRooms()" title="Обновить">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.5 9a9 9 0 0 1 14.8-3.3L23 10M1 14l4.7 4.3A9 9 0 0 0 20.5 15"/>
      </svg>
    </button>
  </div>

  <!-- ROOMS LIST -->
  <div class="section-title">Помещения и рабочие места <span id="room-count" style="font-weight:400;color:var(--text-muted)"></span></div>
  <div id="rooms-container">
    <div class="loading-state"><div class="spinner"></div>Загрузка помещений...</div>
  </div>
</div>

<!-- BOOKING MODAL -->
<div class="modal-overlay" id="booking-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Бронирование</h3>
      <button class="modal-close" onclick="closeModal()">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="booking-summary" id="booking-summary-box"></div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Начало</label>
        <input type="datetime-local" id="modal-from" class="form-control"/>
      </div>
      <div class="form-group">
        <label class="form-label">Конец</label>
        <input type="datetime-local" id="modal-to" class="form-control"/>
      </div>
    </div>

    <div id="alert-booking" class="alert alert-error"></div>

    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn-primary" id="btn-confirm-booking" onclick="confirmBooking()">
        Подтвердить
      </button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  initNav('buildings');

  const params = new URLSearchParams(location.search);
  const floorId      = params.get('floorId');
  const buildingId   = params.get('buildingId');
  const buildingName = params.get('buildingName') || 'Корпус';
  const floorName    = params.get('floorName')    || 'Этаж';

  if (!floorId) window.location.href = 'buildings.html';

  document.getElementById('bc-building').textContent = buildingName;
  document.getElementById('bc-building').href = `floors.html?buildingId=${buildingId}&buildingName=${encodeURIComponent(buildingName)}`;
  document.getElementById('bc-floor').textContent    = floorName;
  document.getElementById('page-title').textContent  = floorName;

  // Pre-fill times
  const pFrom = params.get('from');
  const pTo   = params.get('to');

  function toLocalInput(iso) {
    if (!iso) return '';
    const d   = new Date(iso);
    const off = d.getTimezoneOffset();
    return new Date(d.getTime() - off * 60000).toISOString().slice(0, 16);
  }

  const defaultFrom = pFrom ? toLocalInput(pFrom) : toLocalInput(new Date());
  const defaultTo   = pTo   ? toLocalInput(pTo)   : toLocalInput(new Date(Date.now() + 3600000));

  document.getElementById('time-from').value = defaultFrom;
  document.getElementById('time-to').value   = defaultTo;

  // State
  let pendingBooking = null;
  let allRooms = [];

  // ==================== LOAD ROOMS ====================
  async function loadRooms() {
    const container = document.getElementById('rooms-container');
    container.innerHTML = '<div class="loading-state"><div class="spinner"></div>Загрузка помещений...</div>';

    try {
      const rooms = await API.getRoomsByFloor(floorId);

      // Load workplaces for each room
      for (const room of rooms) {
        try {
          const workplaces = await API.getWorkplacesByRoom(room.id);
          room.workplaces = workplaces || [];
        } catch (e) {
          room.workplaces = [];
        }
      }

      allRooms = rooms;
      applyFilters();
    } catch (e) {
      container.innerHTML = `<div class="alert alert-error show">${e.message}</div>`;
    }
  }

  // ==================== FILTERS ====================
  function applyFilters() {
    const searchText = document.getElementById('search-filter').value.toLowerCase().trim();
    const typeFilter = document.getElementById('type-filter').value;
    const from = document.getElementById('time-from').value;
    const to = document.getElementById('time-to').value;

    let filtered = [...allRooms];

    if (searchText) {
      filtered = filtered.filter(room => {
        const matchName = room.name.toLowerCase().includes(searchText);
        const matchWp = room.workplaces && room.workplaces.some(wp =>
          wp.code.toLowerCase().includes(searchText)
        );
        return matchName || matchWp;
      });
    }

    if (typeFilter) {
      filtered = filtered.filter(room => room.type === typeFilter);
    }

    document.getElementById('room-count').textContent = filtered.length ? `(${filtered.length})` : '';
    renderRooms(filtered, from, to);
  }

  // ==================== RENDER ====================
  function renderRooms(rooms, from, to) {
    const container = document.getElementById('rooms-container');
    if (rooms.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
          </svg>
          <h3>Помещения не найдены</h3>
          <p>Попробуйте изменить фильтры</p>
        </div>`;
      return;
    }

    container.innerHTML = rooms.map(room => roomCard(room, from, to)).join('');
  }

  function roomCard(room, from, to) {
    const hasWorkplaces = room.workplaces && room.workplaces.length > 0;

    let wpHtml = '';
    if (hasWorkplaces) {
      wpHtml = `
        <div class="workplaces-grid">
          ${room.workplaces.map(wp => workplaceChip(wp, room, from, to)).join('')}
        </div>`;
    }

    let bookRoomBtn = '';
    if (room.bookingMode === 'ROOM' || room.type === 'MEETING_ROOM' || room.type === 'LECTURE_ROOM') {
      bookRoomBtn = `
        <button class="btn-primary btn-sm" style="margin-top:12px"
                onclick="openBookingModal('${room.id}','ROOM','${escHtml(room.name)}','${from}','${to}')">
          Забронировать комнату
        </button>`;
    }

    return `
      <div class="room-card card">
        <div class="card-body">
          <div class="room-header">
            <div>
              <span class="room-type">${RoomTypeLabel[room.type] || room.type}</span>
              <h4 style="margin-top:6px">${escHtml(room.name)}</h4>
            </div>
            <span class="badge badge-available">${room.capacity ? `до ${room.capacity} чел.` : 'Комната'}</span>
          </div>
          <div class="room-meta">
            ${room.bookingMode ? `<span>Режим: <strong>${BookingModeLabel[room.bookingMode] || room.bookingMode}</strong></span>` : ''}
            ${hasWorkplaces ? `<span>Мест: <strong>${room.workplaces.length}</strong></span>` : ''}
          </div>
          ${wpHtml}
          ${bookRoomBtn}
        </div>
      </div>`;
  }

  function workplaceChip(wp, room, from, to) {
    const isAvailable = wp.status === 'AVAILABLE';
    const cls = isAvailable ? 'available' : (wp.status === 'MAINTENANCE' ? 'maintenance' : 'unavailable');
    const click = isAvailable
      ? `onclick="openBookingModal('${wp.id}','WORKPLACE','${escHtml(wp.code)}','${from}','${to}')"`
      : '';
    const statusLabel = WorkplaceStatusLabel[wp.status] || wp.status;
    return `
      <div class="workplace-chip ${cls}" ${click} title="${statusLabel}">
        <div style="font-weight:600">${escHtml(wp.code)}</div>
        <div style="font-size:11px;opacity:.7;margin-top:2px">${isAvailable ? '✓' : '✗'}</div>
      </div>`;
  }

  // ==================== MODAL ====================
  function openBookingModal(targetId, targetType, targetName, from, to) {
    pendingBooking = { targetId, targetType, targetName };
    hideAlert('alert-booking');

    document.getElementById('modal-from').value = from || '';
    document.getElementById('modal-to').value   = to   || '';

    document.getElementById('booking-summary-box').innerHTML = `
      <h4>Детали бронирования</h4>
      <div class="summary-row"><span>Объект</span><span>${escHtml(targetName)}</span></div>
      <div class="summary-row"><span>Тип</span><span>${BookingModeLabel[targetType] || targetType}</span></div>`;

    document.getElementById('booking-modal').classList.add('show');
  }

  function closeModal() {
    document.getElementById('booking-modal').classList.remove('show');
    pendingBooking = null;
  }

  async function confirmBooking() {
    if (!pendingBooking) return;
    hideAlert('alert-booking');

    const from = document.getElementById('modal-from').value;
    const to   = document.getElementById('modal-to').value;


    if (!from || !to) { showAlert('alert-booking', 'Укажите время начала и конца'); return; }
    if (new Date(from) >= new Date(to)) { showAlert('alert-booking', 'Время начала должно быть раньше окончания'); return; }
    if (new Date(from) < new Date()) { showAlert('alert-booking', 'Нельзя бронировать в прошлом'); return; }

    const btn = document.getElementById('btn-confirm-booking');
    setLoading(btn, true, 'Бронируем...');

    try {
      await API.createBooking(
        pendingBooking.targetId,
        pendingBooking.targetType,
        from,
        to
      );
      closeModal();
      showToast('Бронирование подтверждено!', 'success');
    } catch (e) {
      showAlert('alert-booking', e.message || 'Ошибка при бронировании');
    } finally {
      setLoading(btn, false);
    }
  }

  document.getElementById('booking-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');
  }

  // ==================== INIT ====================
  loadRooms();
</script>
</body>
</html>
