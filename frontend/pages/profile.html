<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Личный кабинет — WorkSpace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .profile-layout { display: grid; grid-template-columns: 300px 1fr; gap: 20px; align-items: start; }
    @media (max-width: 768px) { .profile-layout { grid-template-columns: 1fr; } }

    .sidebar-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      border: 1.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: all .15s;
      color: var(--text-muted);
    }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .booking-row td:first-child { width: 40px; }
    .booking-target-name { font-weight: 600; font-size: 14px; }
    .booking-time { font-size: 12px; color: var(--text-muted); }
  </style>
</head>
<body>

<nav class="app-nav" id="app-nav"></nav>
<div id="toast-container"></div>

<div class="page-container">
  <div class="breadcrumb-bar">
    <a href="home.html">Главная</a>
    <span class="sep">›</span>
    <span class="current">Личный кабинет</span>
  </div>

  <div class="page-header">
    <h1>Личный кабинет</h1>
  </div>

  <div class="profile-layout">
    <!-- SIDEBAR -->
    <div>
      <div class="sidebar-card" id="profile-card">
        <div class="loading-state"><div class="spinner"></div></div>
      </div>

      <div class="sidebar-card" style="margin-top:16px;padding:20px">
        <div class="section-title" style="margin-bottom:12px">Действия</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <a href="buildings.html" class="btn-primary" style="justify-content:center;text-decoration:none">
            + Новое бронирование
          </a>
          <button class="btn-secondary" onclick="doLogout()">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Выйти из аккаунта
          </button>
        </div>
      </div>
    </div>

    <!-- MAIN: BOOKING HISTORY -->
    <div>
      <div class="card" id="history-section">
        <div class="card-body">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <h2 style="font-size:16px;font-weight:700;margin:0" id="history-anchor">История бронирований</h2>
            <button class="btn-secondary btn-sm" onclick="loadBookings()">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.5 9a9 9 0 0 1 14.8-3.3L23 10M1 14l4.7 4.3A9 9 0 0 0 20.5 15"/></svg>
              Обновить
            </button>
          </div>

          <div class="filter-bar">
            <button class="filter-btn active" data-filter="ALL"       onclick="setFilter('ALL',this)">Все</button>
            <button class="filter-btn"        data-filter="CONFIRMED" onclick="setFilter('CONFIRMED',this)">Активные</button>
            <button class="filter-btn"        data-filter="COMPLETED" onclick="setFilter('COMPLETED',this)">Завершённые</button>
            <button class="filter-btn"        data-filter="CANCELLED" onclick="setFilter('CANCELLED',this)">Отменённые</button>
          </div>

          <div id="bookings-list">
            <div class="loading-state"><div class="spinner"></div>Загружаем историю…</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  initNav('profile');

  let allBookings = [];
  let currentFilter = 'ALL';

  async function loadProfile() {
    const user = Auth.getUser();
    const card = document.getElementById('profile-card');

    if (!user) {
      card.innerHTML = `<div class="profile-header"><div class="profile-info"><h2>Пользователь</h2></div></div>`;
      return;
    }

    const ini = initials(user.firstName, user.lastName);
    card.innerHTML = `
      <div class="profile-header">
        <div class="profile-avatar">${ini}</div>
        <div class="profile-info">
          <h2>${escHtml((user.firstName || '') + ' ' + (user.lastName || '')).trim() || 'Пользователь'}</h2>
          <p>${escHtml(user.email || '')}</p>
        </div>
      </div>
      <div style="padding:16px 20px;border-top:1px solid var(--border)">
        <div style="font-size:13px;color:var(--text-muted);display:flex;flex-direction:column;gap:6px">
          <div>Email: <strong>${escHtml(user.email || '—')}</strong></div>
          ${user.roles ? `<div>Роль: <strong>${Array.isArray(user.roles) ? user.roles.join(', ') : user.roles}</strong></div>` : ''}
        </div>
      </div>`;
  }

  async function loadBookings() {
    const list = document.getElementById('bookings-list');
    list.innerHTML = '<div class="loading-state"><div class="spinner"></div>Загружаем…</div>';
    try {
      allBookings = await API.getMyBookings();
      renderBookings();
    } catch (e) {
      list.innerHTML = `<div class="alert alert-error show">${e.message}</div>`;
    }
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderBookings();
  }

  function renderBookings() {
    const list = document.getElementById('bookings-list');
    let items = allBookings;

    if (currentFilter !== 'ALL') {
      items = items.filter(b => b.status === currentFilter);
    }

    // Sort: newest first
    items = [...items].sort((a, b) => new Date(b.createdAt || b.startTime) - new Date(a.createdAt || a.startTime));

    if (items.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
          </svg>
          <h3>Нет бронирований</h3>
          <p>Здесь появится история ваших броней</p>
          <a href="buildings.html" class="btn-primary" style="text-decoration:none">Забронировать место</a>
        </div>`;
      return;
    }

    // Mobile: cards; Desktop: table
    if (window.innerWidth <= 640) {
      list.innerHTML = items.map(b => mobileBookingCard(b)).join('');
    } else {
      list.innerHTML = `
        <table class="bookings-table">
          <thead>
            <tr>
              <th>Объект</th>
              <th>Тип</th>
              <th>Начало</th>
              <th>Окончание</th>
              <th>Статус</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${items.map(b => bookingRow(b)).join('')}</tbody>
        </table>`;
    }
  }

  function bookingRow(b) {
    const canCancel = b.status === 'CONFIRMED' && new Date(b.startTime) > new Date();
    return `
      <tr class="booking-row">
        <td>
          <div class="booking-target-name">${escHtml(b.targetName || '—')}</div>
        </td>
        <td style="color:var(--text-muted);font-size:13px">${BookingModeLabel[b.targetType] || b.targetType}</td>
        <td class="booking-time">${formatDateTime(b.startTime)}</td>
        <td class="booking-time">${formatDateTime(b.endTime)}</td>
        <td><span class="badge ${BookingStatusClass[b.status]}">${BookingStatusLabel[b.status]}</span></td>
        <td>
          ${canCancel ? `<button class="btn-danger btn-sm" onclick="cancelBooking('${b.id}',this)">Отменить</button>` : ''}
        </td>
      </tr>`;
  }

  function mobileBookingCard(b) {
    const canCancel = b.status === 'CONFIRMED' && new Date(b.startTime) > new Date();
    return `
      <div class="card" style="margin-bottom:10px">
        <div class="card-body">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
            <div class="booking-target-name">${escHtml(b.targetName || '—')}</div>
            <span class="badge ${BookingStatusClass[b.status]}">${BookingStatusLabel[b.status]}</span>
          </div>
          <div style="font-size:13px;color:var(--text-muted);margin-bottom:4px">${BookingModeLabel[b.targetType] || b.targetType}</div>
          <div class="booking-time">${formatDateTime(b.startTime)} — ${formatDateTime(b.endTime)}</div>
          ${canCancel ? `<div style="margin-top:10px"><button class="btn-danger btn-sm" onclick="cancelBooking('${b.id}',this)">Отменить</button></div>` : ''}
        </div>
      </div>`;
  }

  async function cancelBooking(id, btn) {
    if (!confirm('Вы уверены, что хотите отменить это бронирование?')) return;
    btn.disabled = true; btn.textContent = '…';
    try {
      await API.cancelBooking(id);
      showToast('Бронирование отменено', 'success');
      await loadBookings();
    } catch (e) {
      showToast(e.message, 'error');
      btn.disabled = false; btn.textContent = 'Отменить';
    }
  }

  function doLogout() {
    if (!confirm('Выйти из аккаунта?')) return;
    Auth.clear();
    window.location.href = '/pages/auth.html';
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Scroll to history if hash
  if (location.hash === '#history') {
    setTimeout(() => document.getElementById('history-anchor')?.scrollIntoView({ behavior: 'smooth' }), 300);
  }

  loadProfile();
  loadBookings();
</script>
</body>
</html>
