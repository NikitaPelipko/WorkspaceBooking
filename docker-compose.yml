services:
  db:
    image: postgres:18
    container_name: workspacebooking-db
    environment:
      POSTGRES_DB: workspace_booking
      POSTGRES_USER: workspace_user
      POSTGRES_PASSWORD: workspace_pass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workspace_user -d workspace_booking"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workspacebooking-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/workspace_booking
      SPRING_DATASOURCE_USERNAME: workspace_user
      SPRING_DATASOURCE_PASSWORD: workspace_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"

volumes:
  db_data:
