services:
  db:
    image: postgres:18
    container_name: workspacebooking-db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - workspace-network

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workspacebooking-app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"
    networks:
      - workspace-network
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: workspacebooking-frontend
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - workspace-network

volumes:
  db_data:

networks:
  workspace-network:
    driver: bridge

